<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Entrenched Database V12.1</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="titleSection">

<h1>Entrenched Database</h1>

<p>
Community Player Statistics
</p>

</div>

<div class="headerButtons">

<button
id="themeToggle"
class="headerButton">

🌓 Toggle Theme

</button>

</div>

</header>

<main>

<div class="layout">

<section class="card">

<h2>Add Player</h2>

<label>Player Name</label>

<input
type="text"
id="playerName"
placeholder="Player name">

<label>Danger</label>

<input
type="range"
id="danger"
min="0"
max="25"
value="12">

<div
class="value"
id="dangerValue">

12

</div>

<label>Difficulty</label>

<input
type="range"
id="difficulty"
min="0"
max="25"
value="12">

<div
class="value"
id="difficultyValue">

12

</div>

<label>Rarity</label>

<select id="rarity">

<option>Legendary</option>
<option>Epic</option>
<option>Rare</option>
<option>Three-Quarters-Rare</option>
<option>Semi-Rare</option>
<option>Uncommon</option>
<option>Common</option>

</select>

<button
id="addPlayer">

Add Player

</button>

<div id="status"></div>

</section>

<section class="card graphCard">

<div class="graphHeader">

<div>

<h2>Danger vs Difficulty</h2>

<p>25 × 25 Graph</p>

</div>

</div>

<canvas
id="graph"
width="1200"
height="850">

</canvas>

</section>

</div>

<section class="card">

<div class="databaseHeader">

<div>

<h2>Player Database</h2>

<p>

<span id="playerCount">0</span>

Players

</p>

</div>

</div>

<div class="toolbar">

<input
type="text"
id="search"
placeholder="🔍 Search player...">

<select id="sort">

<option value="name">Sort by Name</option>
<option value="danger">Sort by Danger</option>
<option value="difficulty">Sort by Difficulty</option>
<option value="rarity">Sort by Rarity</option>

</select>

</div>

<div id="playerList">

No players yet.

</div>

</section>

</main>

<script src="script.js"></script>

</body>

</html>
